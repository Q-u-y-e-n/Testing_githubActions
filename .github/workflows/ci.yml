name: Selenium CI Pipeline

# 1. Kích hoạt workflow khi push hoặc pull request vào nhánh main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux

    steps:
      # Bước 1: Lấy mã nguồn từ repo về máy ảo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Thiết lập môi trường Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Bước 3: Chạy Test
      # Lưu ý: Bạn cần cấu hình trình duyệt chạy ở chế độ 'headless' trong code Java
      - name: Run Selenium Tests
        run: mvn test