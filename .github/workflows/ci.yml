name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Firefox   # ← Thêm bước này cho Firefox
        if: matrix.browser == 'firefox'
        run: sudo apt-get install -y firefox

      - name: Run Selenium Tests (${{ matrix.browser }})
        run: mvn test -Dbrowser=${{ matrix.browser }}
        env:
          CI: true              # ← Đảm bảo IS_CI = true trong DriverFactory

      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: target/surefire-reports/