name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      [cite_start]fail-fast: false # Chrome fail không dừng Firefox [cite: 145, 147]
      matrix:
        [cite_start]browser: [chrome, firefox] # Tạo 2 job chạy song song [cite: 144]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - [cite_start]name: Run Selenium Tests (${{ matrix.browser }}) # [cite: 148]
        # Lệnh chạy test truyền tham số browser vào Maven [cite: 149]
        run: mvn test -Dbrowser=${{ matrix.browser }}
        
      - name: Lưu kết quả test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          [cite_start]name: test-results-${{ matrix.browser }} # 2 artifact riêng biệt [cite: 155]
          path: target/surefire-reports/