name: Selenium CI Pipeline

# 1. Kích hoạt workflow khi push hoặc pull request vào nhánh main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
	jobs:
	  [cite_start]build-and-test: # (Hoặc tên job run-tests của bạn) [cite: 140]
	    [cite_start]runs-on: ubuntu-latest [cite: 141]
	    
	    # 1. Thêm khối strategy ở đây
	    [cite_start]strategy: [cite: 142]
	      [cite_start]fail-fast: false # Quan trọng: Nếu Chrome fail, Firefox vẫn tiếp tục chạy [cite: 145]
	      [cite_start]matrix: [cite: 143]
	        [cite_start]browser: [chrome, firefox] # Tạo 2 job chạy song song cho 2 trình duyệt [cite: 144]
	        
	    steps:
	      - name: Checkout code
	        uses: actions/checkout@v4
	        
	      - name: Set up JDK 17
	        uses: actions/setup-java@v4
	        with:
	          java-version: '17'
	          distribution: 'temurin'
	          cache: maven

	      # 2. Cập nhật lệnh chạy test để truyền biến browser vào Java
	      - [cite_start]name: Run Selenium Tests (${{ matrix.browser }}) [cite: 148]
	        [cite_start]run: mvn test -Dbrowser=${{ matrix.browser }} [cite: 149]
	        
	      # 3. (Tùy chọn) Tách Artifact lưu kết quả cho từng trình duyệt
	      - name: Save test results
	        if: always()
	        uses: actions/upload-artifact@v4
	        with:
	          [cite_start]name: test-results-${{ matrix.browser }} # Lưu 2 artifact riêng biệt [cite: 155]
	          [cite_start]path: target/surefire-reports/ [cite: 155]